name: diag-feed
on: workflow_dispatch
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: fetchRss 5x rapid — is staleness per-request?
        run: |
          cat > _diag.ts <<'TS'
          import { fetchRss } from './lib/scrapers/rss';
          (async()=>{
            for (let i=1;i<=5;i++){
              try { const out = await fetchRss('https://splash247.com/feed/', { skipOgImage: true });
                console.log('RESULT try'+i+' newest='+out[0]?.published_at+' top='+(out[0]?.url||'').replace('https://splash247.com/','').slice(0,40));
              } catch(e:any){ console.log('RESULT try'+i+' THREW '+e.message.slice(0,40)); }
            }
          })();
          TS
          npx tsx _diag.ts
